<style>
  :root { color-scheme: light; --pink:#F0059A; --pink-light:#ff40b8; --pink-pale:#fce7f3; --black:#0a0a0a; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f5f7;color:#111;min-height:100vh;direction:rtl}
  .header{background:var(--black);color:white;padding:16px 24px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.5)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:12px}
  .logo-lockup{display:flex;align-items:center;gap:12px}
  .brand-text{display:flex;flex-direction:column;line-height:1}
  .brand-name{font-size:22px;font-weight:900;letter-spacing:-.5px;color:white}
  .brand-name span{color:var(--pink)}
  .brand-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
  .header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .last-updated{font-size:11px;background:rgba(255,255,255,.08);padding:3px 10px;border-radius:20px;white-space:nowrap;color:rgba(255,255,255,.6)}
  .conf-count{font-size:11px;color:var(--pink);font-weight:700}
  .filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .search-box{flex:1;min-width:160px;padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:white;font-size:13px;outline:none;direction:rtl;transition:border-color .2s}
  .search-box:focus{border-color:var(--pink)}
  .search-box::placeholder{color:rgba(255,255,255,.35)}
  .filter-btn{padding:6px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.65);font-size:11.5px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .filter-btn:hover{border-color:var(--pink);color:var(--pink-light)}
  .filter-btn.active{background:var(--pink);color:white;border-color:var(--pink);font-weight:700}
  .filter-btn.new-filter{border-color:rgba(240,5,154,.4);color:var(--pink-light)}
  .filter-btn.new-filter.active{background:var(--pink);color:white}
  .stats-bar{background:white;padding:9px 24px;display:flex;gap:20px;align-items:center;border-bottom:1px solid #e8e8e8;flex-wrap:wrap}
  .stat{font-size:12px;color:#888}
  .stat strong{color:#111;font-size:16px;margin-left:3px;font-weight:800}
  .stat.new-stat strong{color:var(--pink)}
  .content{padding:14px 20px}
  .section-header{display:flex;align-items:center;gap:10px;margin:20px 0 11px;padding-bottom:8px;border-bottom:2px solid}
  .section-header .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .section-header h2{font-size:15px;font-weight:800}
  .section-header .count{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
  .section-header .new-count{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--pink-pale);color:var(--pink);font-weight:700}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:10px;margin-bottom:6px}
  .card{background:white;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-right:4px solid;transition:transform .15s,box-shadow .15s;position:relative}
  .card:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.1)}
  .card.is-new{box-shadow:0 0 0 2px var(--pink),0 1px 4px rgba(0,0,0,.07)}
  .card.is-new:hover{box-shadow:0 0 0 2px var(--pink),0 5px 16px rgba(0,0,0,.1)}
  .new-ribbon{position:absolute;top:10px;left:10px;background:var(--pink);color:white;font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;z-index:2}
  .new-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.7);animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
  .card.is-major::after{content:'⭐ בכיר';position:absolute;top:8px;left:10px;font-size:9px;background:#fff7ed;color:#92400e;padding:2px 6px;border-radius:6px;font-weight:700}
  .card.is-new.is-major::after{top:34px}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;gap:6px}
  .card h3{font-size:13.5px;font-weight:700;line-height:1.4;flex:1}
  .badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
  .badge.upcoming{background:#dcfce7;color:#166534}
  .badge.soon{background:#fef9c3;color:#854d0e}
  .badge.passed{background:#f3f4f6;color:#9ca3af}
  .badge.tbd{background:#f5f3ff;color:#5b21b6}
  .card-detail{font-size:11.5px;color:#777;margin-bottom:4px;display:flex;align-items:center;gap:5px}
  .card-detail .icon{font-size:12px;flex-shrink:0}
  .card-desc{font-size:11.5px;color:#555;margin-top:7px;line-height:1.5}
  .card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .tag{font-size:10px;padding:2px 7px;border-radius:5px;background:#f5f5f7;color:#555}
  .found-date{font-size:10px;color:var(--pink);margin-top:6px;font-weight:700}
  .card-link{display:inline-block;margin-top:8px;font-size:11px;color:var(--pink);text-decoration:none;font-weight:700}
  .card-link:hover{text-decoration:underline}
  .hidden{display:none!important}
  .section-wrapper.hidden{display:none}
</style>
</head>

const topicConfig={hr:{label:'👥 משאבי אנוש ורווחה',color:'#6366f1'},cyber:{label:'🛡️ סייבר וטכנולוגיה',color:'#ef4444'},ai:{label:'🤖 בינה מלאכותית',color:'#8b5cf6'},energy:{label:'⚡ אנרגיה ואנרגיה מתחדשת',color:'#f59e0b'},bio:{label:'🔬 ביולוגיה וביוכימיה',color:'#10b981'},realestate:{label:'🏢 נדל"ן וניהול נכסים',color:'#3b82f6'}};
let activeTopic='all';
const isNew=d=>new Date(d)>=WEEK_AGO;
function getStatus(s){const d=(new Date(s)-TODAY)/86400000;if(d<0)return{cls:'passed',label:'✓ עבר'};if(d<=45)return{cls:'soon',label:'🔥 קרוב!'};return{cls:'upcoming',label:'⏳ מתקרב'};}
function fmtDate(d){const dt=new Date(d);return`${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;}
function filterCards(){const q=document.getElementById('searchInput').value.toLowerCase().trim();let total=0,newC=0,soon=0,upcoming=0,passed=0;document.querySelectorAll('.section-wrapper').forEach(sec=>{const isU=activeTopic==='upcoming_only',isN=activeTopic==='new_only',tMatch=['all','upcoming_only','new_only'].includes(activeTopic)||activeTopic===sec.dataset.topic;let vis=0;sec.querySelectorAll('.card').forEach(card=>{const st=card.dataset.status,nw=card.dataset.isnew==='true',ok=tMatch&&(!isU||st==='soon'||st==='upcoming')&&(!isN||nw)&&(!q||card.dataset.search.includes(q));card.classList.toggle('hidden',!ok);if(ok){vis++;total++;if(nw)newC++;if(st==='soon')soon++;else if(st==='upcoming')upcoming++;else if(st==='passed')passed++;}});sec.classList.toggle('hidden',vis===0);const cnt=sec.querySelector('.count');if(cnt)cnt.textContent=vis;const ncnt=sec.querySelector('.new-count');if(ncnt){const sN=[...sec.querySelectorAll('.card:not(.hidden)')].filter(c=>c.dataset.isnew==='true').length;ncnt.style.display=sN>0?'':'none';ncnt.textContent=`✨ ${sN} חדש`;}});document.getElementById('totalCount').textContent=total;document.getElementById('newCount').textContent=newC;document.getElementById('soonCount').textContent=soon;document.getElementById('upcomingCount').textContent=upcoming;document.getElementById('passedCount').textContent=passed;document.getElementById('confCountHeader').textContent=total+' כנסים במאגר';}
function setTopic(btn,topic){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeTopic=topic;filterCards();}
function render(){const container=document.getElementById('mainContent');container.innerHTML='';['hr','cyber','ai','energy','bio','realestate'].forEach(topic=>{const cfg=topicConfig[topic],c=cfg.color,items=conferences.filter(x=>x.topic===topic).sort((a,b)=>new Date(a.date)-new Date(b.date)),sN=items.filter(x=>isNew(x.foundDate)).length;const wrap=document.createElement('div');wrap.className='section-wrapper';wrap.dataset.topic=topic;wrap.innerHTML=`<div class="section-header" style="border-color:${c}"><div class="dot" style="background:${c}"></div><h2 style="color:${c}">${cfg.label}</h2><span class="count" style="background:${c}22;color:${c}">${items.length}</span><span class="new-count" style="display:${sN>0?'':'none'}">✨ ${sN} חדש</span></div><div class="cards-grid"></div>`;container.appendChild(wrap);const grid=wrap.querySelector('.cards-grid');items.forEach(conf=>{const st=getStatus(conf.date),nw=isNew(conf.foundDate),card=document.createElement('div');card.className=`card${conf.major?' is-major':''}${nw?' is-new':''}`;card.style.borderColor=c;card.dataset.status=st.cls;card.dataset.isnew=nw?'true':'false';card.dataset.search=`${conf.name} ${conf.loc} ${conf.org} ${conf.tags.join(' ')} ${conf.desc}`.toLowerCase();card.innerHTML=`${nw?'<div class="new-ribbon"><span class="new-dot"></span>חדש השבוע</div>':''}<div class="card-top" style="${nw?'margin-top:24px':''}"><h3>${conf.name}</h3><span class="badge ${st.cls}">${st.label}</span></div><div class="card-detail"><span class="icon">📅</span>${conf.ddisp}</div><div class="card-detail"><span class="icon">📍</span>${conf.loc}</div><div class="card-detail"><span class="icon">🏛️</span>${conf.org}</div><p class="card-desc">${conf.desc}</p><div class="card-tags">${conf.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>${nw?`<div class="found-date">✨ נמצא ב-${fmtDate(conf.foundDate)}</div>`:''}<a class="card-link" href="${conf.url}" target="_blank">לאתר הכנס ←</a>`;grid.appendChild(card);});});}
render();
