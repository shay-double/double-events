name: Double Events — Weekly Update

on:
  schedule:
    - cron: '0 6 * * 1'  # כל יום שני ב-09:00 שעון ישראל (UTC+3)
  workflow_dispatch:       # אפשרות הפעלה ידנית

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Search for new conferences
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 search_conferences.py

      - name: Update last-updated date in HTML
        run: |
          TODAY=$(date +'%d.%m.%Y')
          sed -i "s/עודכן: [0-9][0-9]\.[0-9][0-9]\.[0-9][0-9][0-9][0-9]/עודכן: $TODAY/g" index.html
          echo "Updated date to $TODAY"

      - name: Commit and push if changed
        run: |
          git config user.name "Double Events Bot"
          git config user.email "double-events@auto.com"
          git add -A
          git diff --staged --quiet || git commit -m "🔄 Weekly update $(date +'%d.%m.%Y')"
          git push
