name: Double Events — Weekly Update

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 09:00 Israel time (UTC+3)
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Stamp last-updated date in HTML
        run: |
          TODAY=$(date +'%d.%m.%Y')
          sed -i "s/עודכן: [0-9][0-9]\.[0-9][0-9]\.[0-9][0-9][0-9][0-9]/עודכן: $TODAY/g" index.html
          echo "Stamped: $TODAY"

      - name: Commit and push to main (if changed)
        run: |
          git config user.name "Double Events Bot"
          git config user.email "double-events@auto.com"
          git add index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "🔄 Weekly update $(date +'%d.%m.%Y')"
          git push origin main

      - name: Sync main → gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          git checkout main -- index.html
          git add index.html
          git diff --staged --quiet && echo "gh-pages already up to date" && exit 0
          git commit -m "🔄 Sync gh-pages $(date +'%d.%m.%Y')"
          git push origin gh-pages
